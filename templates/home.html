<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .login {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #4e54c8;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        legend {
            font-size: 18px;
            color: #555;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .mb-3 {
            margin-bottom: 20px !important; /* Boxes ke beech space */
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.2);
        }
        .btn-primary {
            background: #764ba2;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #4e54c8;
            transform: translateY(-2px);
        }
        .result-text {
            text-align: center;
            margin-top: 30px;
            color: #2d3436;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #764ba2;
        }
    </style>
</head>
<body>

    <div class="login">
        <h1>Student Exam Performance Indicator</h1>
        
        <form action="{{ url_for('predict_datapoint')}}" method="post">
            <legend>Fill Student Details for Prediction</legend>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select class="form-control" name="gender" required>
                    <option selected disabled value="">Select your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Race or Ethnicity</label>
                <select class="form-control" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Parental Level of Education</label>
                <select class="form-control" name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Lunch Type</label>
                <select class="form-control" name="lunch" required>
                    <option selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Test Preparation Course</label>
                <select class="form-control" name="test_preparation_course" required>
                    <option selected disabled value="">Select Test Course</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Reading Score (0-100)</label>
                    <input class="form-control" type="number" name="reading_score" placeholder="Reading score" min='0' max='100' required />
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Writing Score (0-100)</label>
                    <input class="form-control" type="number" name="writing_score" placeholder="Writing score" min='0' max='100' required />
                </div>
            </div>

            <div class="mt-4">
                <input class="btn btn-primary" type="submit" value="Predict Maths Score" />
            </div>
        </form>

        {% if results %}
        <div class="result-text">
            <h3>Prediction Result: <span style="color: #764ba2;">{{results}}</span></h3>
        </div>
        {% endif %}
    </div>

</body>
</html>
